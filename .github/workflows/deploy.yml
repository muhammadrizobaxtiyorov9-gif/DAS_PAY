name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger tugmasi

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Render .env on the server from GitHub Secrets
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          envs: DATABASE_URL,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,ADMIN_TOKEN_SECRET,JWT_SECRET,CRON_SECRET,REVALIDATION_SECRET,HEALTH_TOKEN,REDIS_URL,VAPID_PUBLIC_KEY,VAPID_PRIVATE_KEY,VAPID_SUBJECT,NEXT_PUBLIC_VAPID_PUBLIC_KEY,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,CLICK_MERCHANT_ID,CLICK_SERVICE_ID,PAYME_MERCHANT_ID,PAYMENTS_WEBHOOK_SECRET,FX_USD_UZS,FX_RUB_UZS,FX_EUR_UZS,ANTHROPIC_API_KEY,ANTHROPIC_OCR_MODEL,OPENAI_API_KEY,LOG_LEVEL,SERVICE_NAME,APP_VERSION,NEXT_PUBLIC_SITE_URL,BOT_WEB_APP_URL,NEXT_PUBLIC_GOOGLE_VERIFICATION,NEXT_PUBLIC_YANDEX_VERIFICATION,NEXT_PUBLIC_BING_VERIFICATION,NEXT_PUBLIC_FB_DOMAIN_VERIFICATION,NEXT_PUBLIC_GA_ID
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ADMIN_TOKEN_SECRET: ${{ secrets.ADMIN_TOKEN_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
          HEALTH_TOKEN: ${{ secrets.HEALTH_TOKEN }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          CLICK_MERCHANT_ID: ${{ secrets.CLICK_MERCHANT_ID }}
          CLICK_SERVICE_ID: ${{ secrets.CLICK_SERVICE_ID }}
          PAYME_MERCHANT_ID: ${{ secrets.PAYME_MERCHANT_ID }}
          PAYMENTS_WEBHOOK_SECRET: ${{ secrets.PAYMENTS_WEBHOOK_SECRET }}
          FX_USD_UZS: ${{ secrets.FX_USD_UZS }}
          FX_RUB_UZS: ${{ secrets.FX_RUB_UZS }}
          FX_EUR_UZS: ${{ secrets.FX_EUR_UZS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_OCR_MODEL: ${{ secrets.ANTHROPIC_OCR_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
          APP_VERSION: ${{ github.sha }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          BOT_WEB_APP_URL: ${{ secrets.BOT_WEB_APP_URL }}
          NEXT_PUBLIC_GOOGLE_VERIFICATION: ${{ secrets.NEXT_PUBLIC_GOOGLE_VERIFICATION }}
          NEXT_PUBLIC_YANDEX_VERIFICATION: ${{ secrets.NEXT_PUBLIC_YANDEX_VERIFICATION }}
          NEXT_PUBLIC_BING_VERIFICATION: ${{ secrets.NEXT_PUBLIC_BING_VERIFICATION }}
          NEXT_PUBLIC_FB_DOMAIN_VERIFICATION: ${{ secrets.NEXT_PUBLIC_FB_DOMAIN_VERIFICATION }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          script: |
            set -euo pipefail
            cd /var/www/DAS_PAY

            # Atomically rewrite .env so a half-written file never gets read by
            # a restarting PM2 process. Permissions are tightened to 600 so
            # only the deploying user can read the secrets at rest.
            umask 077
            cat > .env.new <<EOF
            # Generated by GitHub Actions — do not edit by hand
            DATABASE_URL="${DATABASE_URL}"
            TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN}"
            TELEGRAM_CHAT_ID="${TELEGRAM_CHAT_ID}"
            ADMIN_TOKEN_SECRET="${ADMIN_TOKEN_SECRET}"
            JWT_SECRET="${JWT_SECRET}"
            CRON_SECRET="${CRON_SECRET}"
            REVALIDATION_SECRET="${REVALIDATION_SECRET}"
            HEALTH_TOKEN="${HEALTH_TOKEN}"
            REDIS_URL="${REDIS_URL}"
            VAPID_PUBLIC_KEY="${VAPID_PUBLIC_KEY}"
            VAPID_PRIVATE_KEY="${VAPID_PRIVATE_KEY}"
            VAPID_SUBJECT="${VAPID_SUBJECT}"
            NEXT_PUBLIC_VAPID_PUBLIC_KEY="${NEXT_PUBLIC_VAPID_PUBLIC_KEY}"
            SMTP_HOST="${SMTP_HOST}"
            SMTP_PORT="${SMTP_PORT}"
            SMTP_USER="${SMTP_USER}"
            SMTP_PASS="${SMTP_PASS}"
            CLICK_MERCHANT_ID="${CLICK_MERCHANT_ID}"
            CLICK_SERVICE_ID="${CLICK_SERVICE_ID}"
            PAYME_MERCHANT_ID="${PAYME_MERCHANT_ID}"
            PAYMENTS_WEBHOOK_SECRET="${PAYMENTS_WEBHOOK_SECRET}"
            FX_USD_UZS="${FX_USD_UZS}"
            FX_RUB_UZS="${FX_RUB_UZS}"
            FX_EUR_UZS="${FX_EUR_UZS}"
            ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}"
            ANTHROPIC_OCR_MODEL="${ANTHROPIC_OCR_MODEL}"
            OPENAI_API_KEY="${OPENAI_API_KEY}"
            LOG_LEVEL="${LOG_LEVEL}"
            SERVICE_NAME="${SERVICE_NAME}"
            APP_VERSION="${APP_VERSION}"
            NODE_ENV="production"
            NEXT_PUBLIC_SITE_URL="${NEXT_PUBLIC_SITE_URL}"
            BOT_WEB_APP_URL="${BOT_WEB_APP_URL}"
            NEXT_PUBLIC_GOOGLE_VERIFICATION="${NEXT_PUBLIC_GOOGLE_VERIFICATION}"
            NEXT_PUBLIC_YANDEX_VERIFICATION="${NEXT_PUBLIC_YANDEX_VERIFICATION}"
            NEXT_PUBLIC_BING_VERIFICATION="${NEXT_PUBLIC_BING_VERIFICATION}"
            NEXT_PUBLIC_FB_DOMAIN_VERIFICATION="${NEXT_PUBLIC_FB_DOMAIN_VERIFICATION}"
            NEXT_PUBLIC_GA_ID="${NEXT_PUBLIC_GA_ID}"
            EOF
            mv .env.new .env

      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /var/www/DAS_PAY

            echo "::group::Git pull"
            git fetch --all --prune
            git reset --hard origin/main
            echo "::endgroup::"

            echo "::group::Install deps"
            if [ -f pnpm-lock.yaml ]; then
              pnpm install --frozen-lockfile --prod=false
            else
              npm ci
            fi
            echo "::endgroup::"

            echo "::group::Prisma db push + generate"
            # `db push` (without --accept-data-loss) syncs the schema and
            # refuses if a change would drop data — safer than the original
            # `--accept-data-loss` flag. Migration history isn't tracked,
            # which matches the project's current workflow.
            npx prisma db push --skip-generate
            npx prisma generate
            echo "::endgroup::"

            echo "::group::Next build"
            pnpm run build || npm run build
            echo "::endgroup::"

            echo "::group::Health check (pre-restart)"
            # Quick sanity check: did the build produce a server bundle?
            test -d .next || (echo "Build artefacts missing"; exit 1)
            echo "::endgroup::"

            echo "::group::PM2 restart"
            pm2 restart ecosystem.config.js --update-env
            pm2 save
            echo "::endgroup::"

            echo "::group::Post-deploy health probe"
            sleep 3
            for i in 1 2 3 4 5; do
              if curl -fsS http://127.0.0.1:3000/api/health > /tmp/health.json; then
                cat /tmp/health.json
                echo "✅ Health OK"
                break
              fi
              echo "Health attempt $i failed, retrying..."
              sleep 3
              if [ "$i" = "5" ]; then
                echo "❌ Health check never succeeded"
                pm2 logs daspay-web --lines 50 --nostream
                exit 1
              fi
            done
            echo "::endgroup::"

            echo "✅ Deploy finished at $(date)"
